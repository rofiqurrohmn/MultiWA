# MultiWA Gateway V1.0.0 - Docker Compose
# Development environment with PostgreSQL and Redis

services:
  # ==============================================
  # PostgreSQL Database
  # ==============================================
  postgres:
    image: postgres:16-alpine
    container_name: multiwa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: multiwa
      POSTGRES_PASSWORD: multiwa123
      POSTGRES_DB: multiwa_gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multiwa -d multiwa_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================================
  # Redis (Cache + Queue)
  # ==============================================
  redis:
    image: redis:7-alpine
    container_name: multiwa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================================
  # MinIO (S3-compatible storage for media)
  # ==============================================
  minio:
    image: minio/minio:latest
    container_name: multiwa-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
