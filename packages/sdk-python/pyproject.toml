[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "multiwa"
version = "1.0.0"
description = "Python SDK for MultiWA - WhatsApp Business API Gateway"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "MultiWA Team", email = "dev@multiwa.io"}
]
keywords = ["whatsapp", "api", "messaging", "automation", "multiwa"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Communications",
    "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
]
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.24.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/multiwa/multiwa-python"
Documentation = "https://docs.multiwa.io"
Repository = "https://github.com/multiwa/multiwa-python"

[tool.hatch.build.targets.sdist]
include = [
    "/multiwa",
]

[tool.hatch.build.targets.wheel]
packages = ["multiwa"]

[tool.black]
line-length = 88
target-version = ["py39"]

[tool.ruff]
line-length = 88
target-version = "py39"

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_ignores = true
