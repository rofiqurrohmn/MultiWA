# ================================
# MultiWA Gateway - Nginx Config
# Replace your-domain.com with your actual domain
# ================================

# Upstream server (Docker container)
upstream multiwa_api {
    server 127.0.0.1:3100;
    keepalive 64;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ================================
# HTTPS Server - your-domain.com
# ================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # SSL Configuration (replace with your cert paths)
    ssl_certificate           /etc/nginx/ssl/your-domain.com.pem;
    ssl_certificate_key       /etc/nginx/ssl/your-domain.com.key;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:50m;
    ssl_session_tickets       off;
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client body size for file uploads
    client_max_body_size 50M;

    # Root for static landing page
    root /var/www/multiwa;
    index index.html;

    # ================
    # API Routes (MUST BE BEFORE static files!)
    # ================

    # API Documentation (Swagger UI)
    location = /docs {
        proxy_pass http://multiwa_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger JSON/YAML
    location ^~ /docs-json {
        proxy_pass http://multiwa_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All API routes (/v1/*) - prefix match
    location ^~ /v1/ {
        proxy_pass http://multiwa_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # ================
    # Static Files (Landing Page) - fallback
    # ================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Logs
    access_log /var/log/nginx/multiwa.access.log;
    error_log  /var/log/nginx/multiwa.error.log warn;
}
